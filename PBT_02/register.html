<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Validation Test</title>
</head>
<body>
  <form action="#" method="post">
    <fieldset>
        <legend>Thông tin cá nhân</legend>
        <label for="name">Họ tên</label>
        <input type="text" id="name" required minlength="2" maxlength="50" placeholder="Họ tên">
        <br>
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="abc@a.com">
        <br>
        <label for="tel">Số điện thoại</label>
        <input type="tel" id="tel" pattern="[0-9]{10}" placeholder="0123456789">
        <br>
        <label for="birth">Ngày sinh</label>
        <input type="date" id="birth" max="2026-04-27" placeholder="2026-04-27">
        <br>
    </fieldset>
    <fieldset>
        <legend>Tài khoản</legend>
        <label for="username">Tên tài khoản</label>
        <input type="text" id="username" pattern="^[A-Za-z0-9_]{3,20}$" placeholder="username">
        <br>
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" minlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9])$" placeholder="password">
        <br>
        <label for="repassword">Nhập lại mật khẩu</label>
        <input type="password" id="repassword" minlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9])$" placeholder="password">
        <br>
    </fieldset>
    <fieldset>
        <legend>Thông tin giao hàng</legend>
        <label for="city">Thành phố:</label>
        <select id="city" name="city" required>
        <option value="">--Chọn thành phố--</option>
        <option value="hanoi">Hà Nội</option>
        <option value="hcm">TP. Hồ Chí Minh</option>
        <option value="danang">Đà Nẵng</option>
        <option value="haiphong">Hải Phòng</option>
        <option value="cantho">Cần Thơ</option>
        </select>
        <br>
        <label for="district">Quận/Huyện:</label>
        <select id="district" name="district">
        <option value="">--Có thể để trống--</option>
        <option value="quan1">Quận 1</option>
        <option value="quan2">Quận 2</option>
        <option value="quan3">Quận 3</option>
        </select>
        <br>
        <label for="address">Địa chỉ chi tiết:</label><br>
        <textarea id="address" name="address" rows="3" required>
        </textarea>
        <br>
        <label>Giới tính:</label>
        <br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Nam</label>
        <br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Nữ</label>
        <br>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Khác</label>
    </fieldset>
    <label for="agreement">Điều khoản</label>
    <input type="checkbox" name="Điều khoản" id="agreement">
    <br>
    <button type="submit">submit</button>
    <br>
    <button type="reset">reset</button>
  </form>
</body>
</html>
