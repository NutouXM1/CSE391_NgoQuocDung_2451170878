<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Đặt hàng</title>
    </head>
    <body>
        <section id="1">
            <table class="cart">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Sản phẩm</th>
                        <th>Đơn giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>01</td>
                        <td>Chổi phủi bụi</td>
                        <td>30.000₫</td>
                        <td>1</td>
                        <td>30.000₫</td>
                    </tr>
                    <tr>
                        <td>02</td>
                        <td>Kéo kim loại</td>
                        <td>60.000₫</td>
                        <td>3</td>
                        <td>180.000₫</td>
                    </tr>
                    <tr>
                        <td>03</td>
                        <td>Xẻng nhôm</td>
                        <td>130.000₫</td>
                        <td>5</td>
                        <td>650.000₫</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="4">Tổng tiền</td>
                        <td>860.000₫</td>
                    </tr>
                </tfoot>
            </table>
        </section>
        <section id="2">
            <form>
                <fieldset class="payment">
                    <legend>Thông tin thanh toán</legend>
                    <input type="radio" name="paymentMethod" id="COD">
                    <label for="COD">COD</label>
                    <input type="radio" name="paymentMethod" id="E-bank">
                    <label for="E-bank">Chuyển khoản</label>
                    <input type="radio" name="paymentMethod" id="E-wallet">
                    <label for="E-wallet">Ví điện tử</label>
                    <br>
                    <label for="Discount">Mã giảm giá</label>
                    <input type="text" id="Discount" pattern="SALE[0-9]{4}">
                    <br>
                    <label for="Note">Ghi chú</label>
                    <textarea id="Note"></textarea>
                </fieldset>
                <fieldset class="shipping">
                    <legend>Thông tin giao hàng</legend>
                    <label for="delivery-date">Ngày giao hàng mong muốn:</label>
                    <input type="date" id="delivery-date" name="delivery-date" min="2026-05-02" required>
                    <br>
                    <label for="time-slot">Khung giờ:</label>
                    <select id="time-slot" name="time-slot" required>
                        <option value="morning">Sáng (8-12h)</option>
                        <option value="afternoon">Chiều (14-18h)</option>
                        <option value="evening">Tối (18-21h)</option>
                    </select>
                    <br>
                    <label for="delivery-range">Thời gian giao hàng (số ngày):</label>
                    <input type="range" id="delivery-range" name="delivery-range" min="1" max="7" step="1">
                    <br>
                    <button type="submit" aria-label="Xác nhận đặt hàng">Đặt hàng</button>
                </fieldset>
            </form>
        </section>
    </body>
</html>
