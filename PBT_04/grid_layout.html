<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>

<body>
    <div class="header">
        <img src="references/logo.png" alt="Logo" class="logo">
        <nav class="nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
        <div class="login">
            <button>Login</button>
            <button>Register</button>
        </div>
    </div>
    <div class="hero">hero placeholder content</div>
    <main class="main">
        <aside class="sidebar">
            <label><input type="checkbox" class="filter" value="electronics"> Điện tử</label>
            <label><input type="checkbox" class="filter" value="fashion"> Thời trang</label>
            <label><input type="checkbox" class="filter" value="books"> Sách</label>
        </aside>
        <div class="content">
            <div class="products_card">
                <img src="references/products1.jpg" alt="headphone" class="products_image">
                <h2 class="products_name">Headphone</h2>
                <p class="products_price">$99.99</p>
                <button class="buy_button">Buy Now</button>
            </div>
            <div class="products_card">
                <img src="references/products2.jpg" alt="bear" class="products_image">
                <h2 class="products_name">Teddy Bear</h2>
                <p class="products_price">$29.99</p>
                <button class="buy_button">Buy Now</button>
            </div>
            <div class="products_card">
                <img src="references/products3.jpg" alt="toy" class="products_image">
                <h2 class="products_name">Toy Car</h2>
                <p class="products_price">$19.99</p>
                <button class="buy_button">Buy Now</button>
            </div>
            <div class="products_card">
                <img src="references/products4.png" alt="pen" class="products_image">
                <h2 class="products_name">Ballpoint Pen</h2>
                <p class="products_price">$4.99</p>
                <button class="buy_button">Buy Now</button>
            </div>
            <div class="products_card">
                <img src="references/products1.jpg" alt="headphone" class="products_image">
                <h2 class="products_name">Headphone</h2>
                <p class="products_price">$99.99</p>
                <button class="buy_button">Buy Now</button>
            </div>
            <div class="products_card">
                <img src="references/products2.jpg" alt="bear" class="products_image">
                <h2 class="products_name">Teddy Bear</h2>
                <p class="products_price">$29.99</p>
                <button class="buy_button">Buy Now</button>
            </div>
        </div>
        <aside class="ads">
            <img src="https://placehold.net/600x400" alt="">
            <img src="https://picsum.photos/200/300" alt="">
            <img src="https://placehold.co/400x300" alt="">
        </aside>
    </main>
    <div class="footer">Placeholder Footer Content</div>
</body>

</html>
