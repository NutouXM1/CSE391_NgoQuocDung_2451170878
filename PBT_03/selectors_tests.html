<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <style>
            h1 {
            font-size: 28px;
            font-weight: bold;
            }
            .price {
            color: red;
            font-style: italic;
            }
            #app header {
            border-bottom: 2px solid black;
            }
            nav a:first-child {
            text-decoration: underline;
            }
            .product.featured h2 {
            font-weight: bold;
            font-size: 24px;
            }
            article > p {
            font-size: 14px;
            }
            a[href="/"] {
            font-weight: bold;
            }
            .top-bar.dark h1 {
            text-transform: uppercase;
            }

        </style>
    </head>
    <div id="app">
        <header class="top-bar dark">
            <h1>ShopTLU</h1>
            <nav>
                <a href="/" class="active">Home</a>
                <a href="/products">Products</a>
                <a href="/about">About</a>
            </nav>
        </header>
        <main>
            <article class="product">
                <h2>iPhone 16</h2>
                <p class="price">25.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
            <article class="product featured">
                <h2>MacBook Pro</h2>
                <p class="price">45.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
        </main>
    </div>
</html>
